name: Deploy to PythonAnywhere

on:
  push:
    branches:
      - main  # Triggers deployment whenever you push to the main branch

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # This robust module communicates cleanly with PythonAnywhere's API engine
      # It completely handles git pulls, virtualenvs, migrations, and reloads automatically
      - name: Deploy to PythonAnywhere Webapp Instance
        uses: amandahla/action-pythonanywhere-deploy@v1.3.0
        with:
          username: ${{ secrets.PA_USERNAME }}
          api_token: ${{ secrets.PA_API_TOKEN }}
          domain_name: ${{ secrets.PA_DOMAIN }}
